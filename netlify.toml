[images]
  remote_images = ["https://source.unsplash.com/.*", "https://images.unsplash.com/.*", "https://ext.same-assets.com/.*", "https://ugc.same-assets.com/.*"]

[build]
  publish = ".next"
  command =command = "bun run build && echo 'Build completed'"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--prefix=/dev/null"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirects para Single Page Application
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Redirects para páginas Next.js
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Redirect www a dominio principal
[[redirects]]
  from = "https://www.custodia360.es/*"
  to = "https://custodia360.es/:splat"
  status = 301
  force = true

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https://api.stripe.com https://api.resend.com;"

# Optimización de cache
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers específicos para API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://custodia360.es"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, stripe-signature"

# Configuración para Stripe webhooks
[[headers]]
  for = "/api/webhooks/stripe"
  [headers.values]
    Access-Control-Allow-Origin = "https://api.stripe.com"
    Access-Control-Allow-Methods = "POST"
    Access-Control-Allow-Headers = "stripe-signature, content-type"

# Edge functions para mejor performance
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Configuración para Next.js
[context.production]
  command = "bun run build"
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  command = "bun run build"
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  command = "bun run build"
  environment = { NODE_ENV = "production" }
